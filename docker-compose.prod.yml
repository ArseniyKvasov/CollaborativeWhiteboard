version: "3.9"

services:
  db:
    image: postgres:15-alpine
    container_name: whiteboard-db-prod
    environment:
      POSTGRES_DB: whiteboard
      POSTGRES_USER: whiteboard
      POSTGRES_PASSWORD: whiteboard_pass
    volumes:
      - postgres_prod_data:/var/lib/postgresql/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U whiteboard -d whiteboard"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: whiteboard-redis-prod
    volumes:
      - redis_prod_data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  whiteboard:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: whiteboard-prod
    env_file:
      - .env.production
    environment:
      REDIS_URL: redis://redis:6379/0
      # Uploaded images live on this container's local disk under the existing
      # whiteboard_data volume. Fine for --workers within one container/host;
      # scaling to multiple hosts would need this on shared/object storage
      # (S3/MinIO) instead - not needed yet at this deployment's scale.
      UPLOAD_DIR: /data/uploads
    ports:
      - "${HOST_PORT:-8000}:8000"
    volumes:
      - whiteboard_data:/data
    restart: unless-stopped
    # Now safe to run multiple workers: Socket.IO fan-out, presence and undo/redo
    # history are all backed by Redis instead of per-process memory.
    command: uvicorn app.main:asgi_app --host 0.0.0.0 --port 8000 --proxy-headers --workers ${UVICORN_WORKERS:-2}
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health', timeout=3).read()"]
      interval: 20s
      timeout: 5s
      retries: 5
      start_period: 15s

volumes:
  whiteboard_data:
  postgres_prod_data:
  redis_prod_data:

