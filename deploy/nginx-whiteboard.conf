upstream whiteboard_app {
    server 127.0.0.1:18743;
}

proxy_cache_path /var/cache/nginx/whiteboard levels=1:2 keys_zone=static_cache:10m max_size=1g inactive=60m use_temp_path=off;

server {
    listen 443 ssl;
    server_name draw.fastclass.ru;

    client_max_body_size 20M;

    add_header X-Frame-Options "ALLOWALL" always;
    add_header Content-Security-Policy "frame-ancestors *;" always;

    ssl_certificate /etc/letsencrypt/live/draw.fastclass.ru/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/draw.fastclass.ru/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;

    gzip off;
    proxy_set_header Accept-Encoding "";

    location /socket.io/ {
        proxy_pass http://whiteboard_app;
        proxy_http_version 1.1;

        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";

        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
        proxy_connect_timeout 75s;

        proxy_buffering off;
        proxy_cache off;
    }

    location /static/ {
        proxy_pass http://whiteboard_app;
        proxy_http_version 1.1;

        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_cache static_cache;
        proxy_cache_key "$scheme$request_method$host$request_uri";
        proxy_cache_valid 200 302 24h;
        proxy_cache_valid 404 5m;
        proxy_cache_use_stale error timeout updating http_500 http_502 http_503 http_504;
        proxy_cache_lock on;
        proxy_ignore_headers Cache-Control Expires Set-Cookie;
        proxy_hide_header Cache-Control;

        add_header Cache-Control "public, max-age=86400, immutable";
        add_header X-Cache-Status $upstream_cache_status;

        expires 1y;
    }

    location / {
        proxy_pass http://whiteboard_app;
        proxy_http_version 1.1;

        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";

        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
        proxy_connect_timeout 75s;

        proxy_buffering off;
        proxy_cache off;
    }
}

server {
    listen 80;
    server_name draw.fastclass.ru;
    return 301 https://$host$request_uri;
}
