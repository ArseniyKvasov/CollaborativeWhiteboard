version: "3.9"

services:
  whiteboard:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: whiteboard-prod
    env_file:
      - .env.production
    ports:
      - "8000:8000"
    volumes:
      - whiteboard_data:/data
    restart: unless-stopped
    command: uvicorn app.main:asgi_app --host 0.0.0.0 --port 8000 --proxy-headers
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health', timeout=3).read()"]
      interval: 20s
      timeout: 5s
      retries: 5
      start_period: 15s

volumes:
  whiteboard_data:
