<!doctype html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Infinite Board</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Caveat:wght@500;600&display=swap" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    :root {
      --toolbar-top: 14px;
      --safe-top: max(8px, env(safe-area-inset-top, 0px));
      --safe-right: max(8px, env(safe-area-inset-right, 0px));
      --safe-bottom: max(8px, env(safe-area-inset-bottom, 0px));
      --safe-left: max(8px, env(safe-area-inset-left, 0px));
    }

    html, body {
      width: 100%;
      height: 100%;
      margin: 0;
      overflow: hidden;
      background: #eef3ff;
      touch-action: none;
      font-family: "Montserrat", "Segoe UI", sans-serif;
    }

    #boardWrap {
      position: fixed;
      inset: 0;
      z-index: 0;
      user-select: none;
      -webkit-user-select: none;
      -webkit-touch-callout: none;
      background:
        linear-gradient(90deg, rgba(17, 24, 39, 0.045) 1px, transparent 1px),
        linear-gradient(rgba(17, 24, 39, 0.045) 1px, transparent 1px),
        #fff;
      background-size: 24px 24px;
    }

    #boardWrap canvas,
    #boardWrap .canvas-container,
    #boardWrap .canvas-container canvas {
      user-select: none;
      -webkit-user-select: none;
      -webkit-touch-callout: none;
      touch-action: none;
    }

    #boardWrap.bg-white {
      background: #fff;
    }

    #canvas {
      position: absolute;
      inset: 0;
      display: block;
    }

    #cursorLayer {
      position: absolute;
      inset: 0;
      pointer-events: none;
      z-index: 20;
    }

    .selection-lock-btn {
      position: fixed;
      z-index: 36;
      display: none;
      box-shadow: 0 10px 24px rgba(17, 24, 39, 0.18);
    }

    #boardNotice {
      position: fixed;
      left: 50%;
      top: max(calc(var(--toolbar-top) + 56px), var(--safe-top));
      transform: translate(-50%, -10px);
      z-index: 38;
      min-width: 220px;
      max-width: min(86vw, 560px);
      padding: 10px 14px;
      border-radius: 11px;
      border: 1px solid #fecaca;
      background: rgba(254, 242, 242, 0.96);
      color: #b91c1c;
      box-shadow: 0 10px 22px rgba(17, 24, 39, 0.16);
      font-size: 13px;
      font-weight: 600;
      text-align: center;
      opacity: 0;
      visibility: hidden;
      pointer-events: none;
      transition: opacity 130ms ease, transform 130ms ease, visibility 130ms ease;
    }

    #boardNotice.is-visible {
      opacity: 1;
      visibility: visible;
      transform: translate(-50%, 0);
    }

    .remote-cursor {
      position: absolute;
      transform: translate(-2px, -2px);
      color: #5b21b6;
      font-size: 14px;
      white-space: nowrap;
    }

    .remote-cursor .name {
      margin-left: 4px;
      background: rgba(91, 33, 182, 0.1);
      border: 1px solid rgba(91, 33, 182, 0.3);
      color: #4c1d95;
      border-radius: 999px;
      padding: 1px 7px;
      font-size: 11px;
    }

    .remote-cursor.offscreen .name {
      display: none;
    }

    .floating-toolbar {
      position: fixed;
      left: 50%;
      top: max(var(--toolbar-top), var(--safe-top));
      transform: translateX(-50%);
      z-index: 30;
      display: inline-flex;
      gap: 8px;
      align-items: center;
      padding: 8px;
      border-radius: 14px;
      background: rgba(255, 255, 255, 0.92);
      border: 1px solid #dce4f3;
      box-shadow: 0 12px 30px rgba(17, 24, 39, 0.14);
      backdrop-filter: blur(7px);
      max-width: calc(100vw - 24px);
      overflow-x: auto;
      -webkit-overflow-scrolling: touch;
      scrollbar-width: none;
      -ms-overflow-style: none;
      pointer-events: auto;
      touch-action: manipulation;
      user-select: none;
    }

    .floating-toolbar::-webkit-scrollbar {
      width: 0;
      height: 0;
      display: none;
    }

    .tool-btn {
      position: relative;
      z-index: 1;
      width: 38px;
      height: 38px;
      border: 0;
      border-radius: 10px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      background: #f2f6ff;
      color: #334155;
      flex: 0 0 auto;
      pointer-events: auto;
      touch-action: manipulation;
      -webkit-tap-highlight-color: transparent;
    }

    .tool-btn:hover {
      background: #e3ebff;
      color: #1d4ed8;
    }

    .tool-btn.active {
      background: #0d6efd;
      color: #fff;
      box-shadow: 0 10px 24px rgba(13, 110, 253, 0.35);
    }

    .tool-btn:disabled {
      opacity: 0.35;
    }

    .desktop-only {
      display: inline-flex;
    }

    .mobile-only {
      display: none;
    }

    .bi-local {
      width: 18px;
      height: 18px;
      display: inline-block;
      background-color: currentColor;
      -webkit-mask-image: var(--icon);
      -webkit-mask-repeat: no-repeat;
      -webkit-mask-position: center;
      -webkit-mask-size: contain;
      mask-image: var(--icon);
      mask-repeat: no-repeat;
      mask-position: center;
      mask-size: contain;
    }

    .floating-panel {
      position: fixed;
      z-index: 35;
      display: none;
      padding: 10px;
      width: 228px;
      border-radius: 14px;
      border: 1px solid #dce4f3;
      background: rgba(255, 255, 255, 0.95);
      box-shadow: 0 10px 26px rgba(17, 24, 39, 0.16);
      backdrop-filter: blur(6px);
      pointer-events: auto;
      touch-action: manipulation;
    }

    .floating-panel.active {
      display: block;
    }

    .shape-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 8px;
    }

    .shape-btn {
      height: 36px;
      border: 1px solid #dce4f3;
      border-radius: 10px;
      background: #f8fbff;
      color: #334155;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
      font-size: 12px;
      font-weight: 600;
    }

    .shape-btn.active {
      border-color: #0d6efd;
      color: #0d6efd;
      background: #eef4ff;
    }

    .shape-btn:disabled {
      opacity: 0.35;
      cursor: not-allowed;
      background: #f3f4f6;
      color: #94a3b8;
      border-color: #e2e8f0;
    }

    .shape-arrow-glyph {
      font-size: 16px;
      line-height: 1;
      font-weight: 700;
    }

    .undo-redo-dock {
      position: fixed;
      left: max(12px, var(--safe-left));
      bottom: max(12px, var(--safe-bottom));
      z-index: 31;
      display: inline-flex;
      gap: 8px;
      padding: 8px;
      border-radius: 12px;
      border: 1px solid #dce4f3;
      background: rgba(255, 255, 255, 0.92);
      box-shadow: 0 10px 24px rgba(17, 24, 39, 0.14);
      backdrop-filter: blur(7px);
    }

    .undo-redo-dock.is-hidden {
      display: none;
    }

    .palette {
      display: grid;
      grid-template-columns: repeat(4, 30px);
      gap: 10px;
      margin-bottom: 12px;
      justify-content: space-between;
    }

    .swatch {
      width: 30px;
      height: 30px;
      border-radius: 999px;
      border: 2px solid transparent;
      box-shadow: none;
      cursor: pointer;
      padding: 0;
      transition: transform 100ms ease, border-color 100ms ease;
    }

    .swatch:hover {
      transform: scale(1.08);
      border-color: #0d6efd;
    }

    .swatch.active {
      border: 2px solid #0d6efd;
      box-shadow: none;
    }

    .mini-wrap {
      position: fixed;
      right: max(14px, var(--safe-right));
      bottom: max(14px, var(--safe-bottom));
      z-index: 25;
      width: 220px;
      border-radius: 14px;
      border: 1px solid #dbe2f1;
      background: rgba(255, 255, 255, 0.92);
      box-shadow: 0 10px 24px rgba(17, 24, 39, 0.14);
      overflow: hidden;
      backdrop-filter: blur(6px);
    }

    #miniMap {
      width: 100%;
      height: 130px;
      display: block;
      background: #f9fbff;
      cursor: grab;
    }

    .zoom-row {
      display: grid;
      grid-template-columns: 36px 1fr 36px;
      border-top: 1px solid #dbe2f1;
    }

    .zoom-btn,
    .zoom-center {
      border: 0;
      background: #fff;
      height: 36px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      font-size: 14px;
      color: #334155;
    }

    .zoom-btn:hover {
      background: #edf2ff;
    }

    #hiddenImageInput {
      display: none;
    }

    @media (max-width: 768px) {
      :root {
        --toolbar-top: 8px;
      }

      .floating-toolbar {
        width: auto;
        max-width: calc(100vw - 2 * var(--safe-left));
        border-radius: 14px;
        padding: 6px;
        gap: 5px;
        justify-content: center;
        flex-wrap: nowrap;
      }

      .desktop-only {
        display: none !important;
      }

      .mobile-only {
        display: inline-flex !important;
      }

      .mini-wrap {
        width: 170px;
        right: 8px;
        bottom: 8px;
      }

      #miniMap {
        height: 96px;
      }

      .tool-btn {
        width: 36px;
        height: 36px;
        border-radius: 9px;
      }

      .tool-btn .bi-local {
        width: 16px;
        height: 16px;
      }

      .undo-redo-dock {
        left: max(8px, var(--safe-left));
        bottom: max(8px, var(--safe-bottom));
        padding: 6px;
      }

      .zoom-btn,
      .zoom-center {
        height: 38px;
      }
    }

    @media (max-width: 430px) {
      .floating-toolbar {
        top: 6px;
        width: calc(100vw - 2 * var(--safe-left));
        max-width: calc(100vw - 2 * var(--safe-left));
      }

      .mini-wrap {
        width: 156px;
      }
    }
  </style>
</head>
<body
  data-board-id="{{ board_id }}"
  data-token="{{ token }}"
  data-username="{{ username }}"
  data-user-role="{{ user_role }}"
>
  <div id="boardWrap" class="bg-grid">
    <canvas id="canvas"></canvas>
    <div id="cursorLayer"></div>
  </div>
  <div id="boardNotice" aria-live="polite"></div>
  <button class="tool-btn selection-lock-btn" id="selectionLockBtn" title="Блокировать выделение" type="button"><span class="bi-local" style="--icon:url('/static/icons/lock.svg')"></span></button>

  <div class="floating-toolbar" id="toolbar">
    <button class="tool-btn active" data-tool="select" title="Курсор"><span class="bi-local" style="--icon:url('/static/icons/cursor.svg')"></span></button>
    <button class="tool-btn" data-tool="hand" title="Ладошка"><span class="bi-local" style="--icon:url('/static/icons/hand-index.svg')"></span></button>
    <button class="tool-btn" data-tool="pencil" id="pencilTool" title="Карандаш"><span class="bi-local" style="--icon:url('/static/icons/pencil.svg')"></span></button>
    <button class="tool-btn" data-tool="shape" id="shapeTool" title="Фигуры"><span class="bi-local" style="--icon:url('/static/icons/diamond.svg')"></span></button>
    <button class="tool-btn" data-tool="text" id="textTool" title="Текст"><span class="bi-local" style="--icon:url('/static/icons/type.svg')"></span></button>
    <button class="tool-btn" data-tool="eraser" title="Ластик"><span class="bi-local" style="--icon:url('/static/icons/eraser.svg')"></span></button>
    <button class="tool-btn desktop-only" id="imageTool" title="Изображение"><span class="bi-local" style="--icon:url('/static/icons/image.svg')"></span></button>
    <button class="tool-btn desktop-only" id="rotateBtn" title="Повернуть на 15°" disabled><span class="bi-local" style="--icon:url('/static/icons/arrow-repeat.svg')"></span></button>
    <button class="tool-btn desktop-only" id="bgBtn" title="Фон"><span class="bi-local" style="--icon:url('/static/icons/grid-3x3-gap-fill.svg')"></span></button>
    <button class="tool-btn desktop-only" id="clearBtn" title="Очистить" style="display:none;"><span class="bi-local" style="--icon:url('/static/icons/trash3.svg')"></span></button>

    <button class="tool-btn mobile-only" id="mobileMoreBtn" title="Еще"><span class="bi-local" style="--icon:url('/static/icons/caret-down-fill.svg')"></span></button>
  </div>

  <div class="undo-redo-dock" id="undoRedoDock">
    <button class="tool-btn" id="undoBtn" title="Назад" disabled><span class="bi-local" style="--icon:url('/static/icons/arrow-counterclockwise.svg')"></span></button>
    <button class="tool-btn" id="redoBtn" title="Вперед" disabled><span class="bi-local" style="--icon:url('/static/icons/arrow-clockwise.svg')"></span></button>
  </div>

  <div class="floating-panel" id="pencilPanel">
    <div class="palette" id="palette"></div>
    <label class="form-label small mb-1 d-block">Толщина</label>
    <input id="strokeWidth" class="form-range w-100" type="range" min="1" max="32" value="2">
  </div>

  <div class="floating-panel" id="textPanel">
    <label class="form-label small mb-1 d-block">Размер текста</label>
    <input id="textSize" class="form-range w-100" type="range" min="12" max="96" value="24">
  </div>

  <div class="floating-panel" id="shapePanel">
    <div class="shape-grid">
      <button class="shape-btn active" data-shape="rect" type="button"><span class="bi-local" style="--icon:url('/static/icons/square.svg')"></span></button>
      <button class="shape-btn" data-shape="ellipse" type="button"><span class="bi-local" style="--icon:url('/static/icons/circle.svg')"></span></button>
      <button class="shape-btn" data-shape="line" type="button"><span class="bi-local" style="--icon:url('/static/icons/slash-lg.svg')"></span></button>
      <button class="shape-btn" data-shape="arrow" type="button"><span class="shape-arrow-glyph">↗</span></button>
      <button class="shape-btn" data-shape="triangle" type="button"><span class="bi-local" style="--icon:url('/static/icons/triangle.svg')"></span></button>
      <button class="shape-btn" data-shape="diamond" type="button"><span class="bi-local" style="--icon:url('/static/icons/diamond.svg')"></span></button>
    </div>
  </div>

  <div class="floating-panel" id="stylePanel" style="left:12px; bottom:12px; top:auto;">
    <label class="form-label small mb-1 d-block">Радиус закругления</label>
    <input id="cornerRadius" class="form-range w-100" type="range" min="0" max="80" value="0">
  </div>

  <div class="floating-panel" id="mobileMorePanel">
    <div class="shape-grid">
      <button class="shape-btn" id="mobileImageBtn" type="button"><span class="bi-local" style="--icon:url('/static/icons/image.svg')"></span></button>
      <button class="shape-btn" id="mobileRotateBtn" type="button"><span class="bi-local" style="--icon:url('/static/icons/arrow-repeat.svg')"></span></button>
      <button class="shape-btn" id="mobileBgBtn" type="button"><span class="bi-local" style="--icon:url('/static/icons/grid-3x3-gap-fill.svg')"></span></button>
      <button class="shape-btn" id="mobileClearBtn" type="button"><span class="bi-local" style="--icon:url('/static/icons/trash3.svg')"></span></button>
    </div>
  </div>

  <div class="mini-wrap">
    <canvas id="miniMap" width="220" height="130"></canvas>
    <div class="zoom-row">
      <button class="zoom-btn" id="zoomOutBtn">-</button>
      <button class="zoom-center" id="zoomCenterBtn">100%</button>
      <button class="zoom-btn" id="zoomInBtn">+</button>
    </div>
  </div>

  <input id="hiddenImageInput" type="file" accept="image/*">

  <script src="https://cdn.jsdelivr.net/npm/fabric@6.5.3/dist/index.min.js"></script>
  <script src="https://cdn.socket.io/4.7.5/socket.io.min.js"></script>
  <script src="/static/board.js?v=20260422-03"></script>
</body>
</html>
