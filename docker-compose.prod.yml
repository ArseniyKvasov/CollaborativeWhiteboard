version: "3.9"

services:
  db:
    image: postgres:15-alpine
    container_name: whiteboard-db-prod
    environment:
      POSTGRES_DB: whiteboard
      POSTGRES_USER: whiteboard
      POSTGRES_PASSWORD: whiteboard_pass
    volumes:
      - postgres_prod_data:/var/lib/postgresql/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U whiteboard -d whiteboard"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: whiteboard-redis-prod
    volumes:
      - redis_prod_data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  whiteboard:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: whiteboard-prod
    env_file:
      - .env.production
    environment:
      REDIS_URL: redis://redis:6379/0
      # Uploaded images live on this container's local disk under the existing
      # whiteboard_data volume. Fine for --workers within one container/host;
      # scaling to multiple hosts would need this on shared/object storage
      # (S3/MinIO) instead - not needed yet at this deployment's scale.
      UPLOAD_DIR: /data/uploads
    ports:
      - "${HOST_PORT:-8000}:8000"
    volumes:
      - whiteboard_data:/data
    restart: unless-stopped
    # Defaults to a single worker on purpose: this is an asyncio/I-O-bound
    # service (Socket.IO connections, not CPU-bound work - image compression
    # already runs in the separate celery-worker), so one process comfortably
    # handles a large number of concurrent connections without the added
    # complexity below.
    #
    # Redis (AsyncRedisManager) only shares pub/sub broadcast between worker
    # processes - it does NOT share the Engine.IO transport/session state for
    # a connection that's still mid-handshake (polling before the upgrade to
    # websocket). If a client's sequential HTTP requests during that handshake
    # land on different worker processes (which happens by default - uvicorn
    # workers all bind the same port via SO_REUSEPORT and the kernel picks
    # one per request), the second worker won't recognize the sid and the
    # connection dies with 400s. This is a fundamental Socket.IO constraint,
    # not specific to this app - see python-socketio's scaling docs.
    #
    # If you do need more than one worker (CPU-bound load, very high
    # concurrent connection count), you must pair it with sticky sessions -
    # e.g. run each worker as its own process on its own port and put an
    # nginx `upstream` with `ip_hash` in front of them - a single `--workers
    # N` inside one container/port is not sufficient on its own.
    command: uvicorn app.main:asgi_app --host 0.0.0.0 --port 8000 --proxy-headers --workers ${UVICORN_WORKERS:-1}
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health', timeout=3).read()"]
      interval: 20s
      timeout: 5s
      retries: 5
      start_period: 15s

  celery-worker:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: whiteboard-celery-worker-prod
    env_file:
      - .env.production
    environment:
      REDIS_URL: redis://redis:6379/0
      # Must match the web service's UPLOAD_DIR - the worker reads staged
      # uploads and writes processed images to the same volume the web
      # service serves /uploads from.
      UPLOAD_DIR: /data/uploads
    volumes:
      - whiteboard_data:/data
    restart: unless-stopped
    command: celery -A app.celery_app worker --loglevel=info --concurrency=2
    depends_on:
      redis:
        condition: service_healthy

volumes:
  whiteboard_data:
  postgres_prod_data:
  redis_prod_data:

