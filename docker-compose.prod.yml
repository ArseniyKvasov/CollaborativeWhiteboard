version: "3.9"

services:
  db:
    image: postgres:15-alpine
    container_name: whiteboard-db-prod
    environment:
      POSTGRES_DB: whiteboard
      POSTGRES_USER: whiteboard
      POSTGRES_PASSWORD: whiteboard_pass
    volumes:
      - postgres_prod_data:/var/lib/postgresql/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U whiteboard -d whiteboard"]
      interval: 10s
      timeout: 5s
      retries: 5

  whiteboard:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: whiteboard-prod
    env_file:
      - .env.production
    ports:
      - "${HOST_PORT:-8000}:8000"
    volumes:
      - whiteboard_data:/data
    restart: unless-stopped
    command: uvicorn app.main:asgi_app --host 0.0.0.0 --port 8000 --proxy-headers
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health', timeout=3).read()"]
      interval: 20s
      timeout: 5s
      retries: 5
      start_period: 15s

volumes:
  whiteboard_data:
  postgres_prod_data:

